# Context Pruning Configuration
pruning:
  # Stage 1: Semantic pruning
  semantic:
    enabled: true
    threshold: 0.3
    model: "all-MiniLM-L6-v2"
    
  # Stage 2: Grade-level pruning
  grade:
    enabled: true
    tolerance: 1  # Allow content 1 grade above/below
    
  # Stage 3: Token budget pruning
  token:
    enabled: true
    max_tokens: 2000
    min_tokens: 100
    
  # Stage 4: Recency pruning
  recency:
    enabled: false
    decay_factor: 0.1
    max_age_years: 5
    
  # Subject-specific overrides
  subjects:
    mathematics:
      semantic_threshold: 0.4
      max_tokens: 1500
      
    history:
      recency_enabled: false
      max_tokens: 2500
      
    science:
      recency_enabled: true
      decay_factor: 0.05
      
  # Grade-specific overrides
  grades:
    "1-5":  # Elementary
      max_tokens: 1000
      semantic_threshold: 0.25
      
    "6-8":  # Middle school
      max_tokens: 1500
      semantic_threshold: 0.3
      
    "9-12":  # High school
      max_tokens: 2000
      semantic_threshold: 0.35