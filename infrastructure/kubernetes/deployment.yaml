apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaledown-tutor-backend
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scaledown-tutor-backend
  template:
    metadata:
      labels:
        app: scaledown-tutor-backend
    spec:
      containers:
      - name: backend
        image: scaledown-tutor-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: redis-url
        - name: SCALEDOWN_API_KEY
          valueFrom:
            secretKeyRef:
              name: scaledown-secret
              key: api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaledown-tutor-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scaledown-tutor-frontend
  template:
    metadata:
      labels:
        app: scaledown-tutor-frontend
    spec:
      containers:
      - name: frontend
        image: scaledown-tutor-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          value: "http://backend-service:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"